<section id="performance" class="performance-section mt-4">
    <div class="glass-panel glow-cyan p-4">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--void-border); padding-bottom: 0.5rem;">
            <h3 class="section-title" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;"><span class="text-cyan">03.</span> ALGORITHM PERFORMANCE COMPARISON</h3>
            <button id="btn-export-report" class="btn btn-outline" style="font-size: 0.7rem; padding: 0.4rem 1rem; display: flex; align-items: center; gap: 0.5rem;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                DOWNLOAD REPORT
            </button>
        </div>
        
        <!-- Live Comparison Split Screen -->
        <div class="live-comparison-grid mt-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
            <!-- Standard SJF Side -->
            <div class="compare-card standard-sjf" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 51, 102, 0.3); border-radius: var(--border-radius-sm); padding: 1.5rem;">
                <div style="font-family: var(--font-heading); font-size: 1rem; color: #ff3366; margin-bottom: 1rem; border-bottom: 1px solid rgba(255, 51, 102, 0.2); padding-bottom: 0.5rem; display: flex; justify-content: space-between;">
                    <span>STANDARD SJF</span>
                    <span style="font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.7;">TRADITIONAL ESTIMATION</span>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);">AVG WAITING TIME</div>
                        <div id="std-wt" style="font-family: var(--font-heading); font-size: 1.2rem; color: #e2e8f0; font-weight: 700;">-- ms</div>
                    </div>
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);">TURNAROUND TIME</div>
                        <div id="std-tat" style="font-family: var(--font-heading); font-size: 1.2rem; color: #e2e8f0; font-weight: 700;">-- ms</div>
                    </div>
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);">CPU UTILIZATION</div>
                        <div id="std-cpu" style="font-family: var(--font-heading); font-size: 1.2rem; color: #e2e8f0; font-weight: 700;">-- %</div>
                    </div>
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);">THROUGHPUT</div>
                        <div id="std-thr" style="font-family: var(--font-heading); font-size: 1.2rem; color: #e2e8f0; font-weight: 700;">--</div>
                    </div>
                </div>
            </div>

            <!-- ML-SJF Side -->
            <div class="compare-card ml-sjf glow-cyan" style="background: rgba(10, 14, 23, 0.8); border: 1px solid var(--neon-cyan); border-radius: var(--border-radius-sm); padding: 1.5rem; position: relative; overflow: hidden;">
                <!-- Subtle glow background effect -->
                <div style="position: absolute; top: -50px; right: -50px; width: 100px; height: 100px; background: var(--neon-cyan); filter: blur(50px); opacity: 0.2;"></div>
                
                <div style="font-family: var(--font-heading); font-size: 1rem; color: var(--neon-cyan); margin-bottom: 1rem; border-bottom: 1px solid rgba(0, 243, 255, 0.3); padding-bottom: 0.5rem; display: flex; justify-content: space-between; position: relative; z-index: 2;">
                    <span>ML-SJF INTELLIGENT</span>
                    <span style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-cyan);">NEURAL PREDICTION</span>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; position: relative; z-index: 2;">
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-cyan-dim);">AVG WAITING TIME</div>
                        <div id="ml-wt" style="font-family: var(--font-heading); font-size: 1.4rem; color: var(--neon-cyan); font-weight: 700;">-- ms</div>
                    </div>
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-cyan-dim);">TURNAROUND TIME</div>
                        <div id="ml-tat" style="font-family: var(--font-heading); font-size: 1.4rem; color: var(--neon-cyan); font-weight: 700;">-- ms</div>
                    </div>
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-cyan-dim);">CPU UTILIZATION</div>
                        <div id="ml-cpu" style="font-family: var(--font-heading); font-size: 1.2rem; color: #fff; font-weight: 700;">-- %</div>
                    </div>
                    <div class="metric-item">
                        <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-cyan-dim);">THROUGHPUT</div>
                        <div id="ml-thr" style="font-family: var(--font-heading); font-size: 1.2rem; color: #fff; font-weight: 700;">--</div>
                    </div>
                </div>
                
                <!-- Performance Gain Badge -->
                <div id="gain-badge" style="position: absolute; bottom: 1.5rem; right: 1.5rem; font-family: var(--font-mono); font-size: 0.75rem; background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0.3rem 0.6rem; border-radius: 4px; display: none;">
                    ▼ Wait Time Reduced
                </div>
            </div>
        </div>
        
        <style>
            @media (max-width: 768px) {
                .live-comparison-grid { grid-template-columns: 1fr !important; }
            }
        </style>

        <div class="charts-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
            <div class="chart-container" style="position: relative; height: 300px; width: 100%;">
                <canvas id="algoComparisonChart"></canvas>
            </div>
            <div class="chart-container" style="position: relative; height: 300px; width: 100%;">
                <canvas id="predictionTrendChart"></canvas>
            </div>
        </div>
    </div>
</section>
